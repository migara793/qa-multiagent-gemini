version: '3.8'

services:
  code-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code-analyzer-service
    ports:
      - "8001:8001"
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - LOG_LEVEL=info
    volumes:
      # Mount your repository for analysis
      - ${REPO_PATH:-/path/to/repo}:/repos:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
